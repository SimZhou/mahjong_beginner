                        <h1>押引 - oshiki01</h1>
                        <p>此页面关于攻击和防守判断（押引）的说明。</p>
                        <p>押引是麻将中判断应该攻击还是防守的重要技术。</p>
                        <p>需要根据当前状况判断应该立直攻击还是防守。</p>
                        <h2>判断要素</h2>
                        <ul>
                            <li>巡目（序盘、中盘、终盘）</li>
                            <li>点数情况（领先、落后、第三位等）</li>
                            <li>听牌质量（两面听、嵌张、单骑）</li>
                            <li>对手的状态（立直、听牌、一向听等）</li>
                            <li>剩余巡目</li>
                        </ul>
                        <p>在麻将中，不只是和牌，防止放铳也是重要的。</p>
                        <p>攻击和防守判断需要综合考虑以上因素。</p>
